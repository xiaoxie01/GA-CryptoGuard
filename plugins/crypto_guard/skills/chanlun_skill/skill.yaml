skill_name: chanlun_skill
version: 1.0
status: active
description: Detect Chanlun fractals, bi, segments, zhongshu, divergence and buy/sell point candidates.
tools: [chanlun_detect_fractals, chanlun_build_bi, chanlun_build_segments, chanlun_detect_zhongshu, chanlun_detect_divergence, chanlun_detect_buy_sell_points]
input:
  required: [symbol, timeframe, closed_candles, previous_analysis_state]
output_schema: schema.json
memory:
  read: [skill_memory, recent_trade_reviews, strategy_feedback]
  write: [skill_execution_logs, skill_feedback_memory]
evolution:
  enabled: true
  allow_prompt_patch: true
  allow_tool_param_patch: true
  require_shadow_testing: true
