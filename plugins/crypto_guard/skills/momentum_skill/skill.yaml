skill_name: momentum_skill
version: 1.0
status: active
description: Judge momentum with deterministic RSI, MACD, ATR, volume impulse, body strength and divergence tools.
tools: [momentum_score, rsi_slope, macd_histogram, atr_expansion, volume_impulse]
input:
  required: [symbol, timeframe, closed_candles, previous_analysis_state]
output_schema: schema.json
memory:
  read: [skill_memory, recent_trade_reviews, strategy_feedback]
  write: [skill_execution_logs, skill_feedback_memory]
evolution:
  enabled: true
  allow_prompt_patch: true
  allow_tool_param_patch: true
  require_shadow_testing: true
