strategies:
  - strategy_name: smc_pullback_long
    version: "1.0"
    status: active
    direction: LONG
    market_regime_required:
      - trend
      - breakout_retest
      - early
      - middle
    higher_tf_filter:
      direction_allowed: ["bullish", "neutral_bullish"]
      disallow_if:
        - trend_stage: "late"
        - btc_context: "risk_off"
    required_evidence:
      - "price_action.last_event == bullish_bos"
      - "smc.liquidity.last_event in [sell_side_liquidity_sweep, discount_retest]"
      - "smc.fvg.direction == bullish"
      - "momentum.direction == bullish"
    optional_evidence:
      - "order_flow.flow_confirmation == supports_long"
      - "chanlun.signal in [class_2_buy_candidate, class_3_buy_candidate]"
    risk_filters:
      - "entry_distance_to_invalid <= 1.2 * atr"
      - "contradiction_level <= medium"
      - "funding_state != extreme_positive"
    scoring:
      htf_alignment: 0.20
      price_action: 0.20
      smc: 0.20
      order_flow: 0.15
      momentum: 0.15
      risk_reward: 0.10
    actions:
      score_above_0_80: paper_trade_candidate
      score_0_72_to_0_80: notify_candidate
      score_0_65_to_0_72: opportunity_watch
      score_below_0_65: no_action

  - strategy_name: pa_breakout_retest_long
    version: "1.0"
    status: active
    direction: LONG
    market_regime_required:
      - trend
      - breakout_retest
    required_evidence:
      - "price_action.last_event == bullish_bos"
      - "price_action.range_status == breakout_retest"
      - "momentum.direction == bullish"
    risk_filters:
      - "contradiction_level <= medium"
      - "trend_stage != late"
    scoring:
      htf_alignment: 0.25
      price_action: 0.30
      momentum: 0.20
      order_flow: 0.15
      risk_reward: 0.10

  - strategy_name: momentum_continuation_long
    version: "1.0"
    status: candidate
    direction: LONG
    market_regime_required:
      - trend
      - high_momentum
    required_evidence:
      - "momentum.momentum_score >= 75"
      - "order_flow.flow_confirmation == supports_long"
      - "price_action.market_structure == bullish"
    risk_filters:
      - "momentum.quality != exhausted"
      - "entry_not_far_from_invalid_price == true"
