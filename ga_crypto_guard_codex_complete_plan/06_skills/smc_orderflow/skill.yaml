skill_name: smc_orderflow
version: 1.0
status: active
ga_controlled: true
description: >
  SMC/订单流：OB、FVG、Liquidity Sweep、Equal High/Low、Premium/Discount、CVD、主动买卖比例

tools:
  - detect_order_blocks
  - detect_fvg
  - detect_liquidity_sweep
  - detect_equal_high_low
  - calc_premium_discount
  - calc_cvd
  - calc_aggressive_buy_sell_ratio
  - detect_price_cvd_divergence

input:
  required:
    - symbol
    - timeframe
    - closed_candles
    - previous_analysis_state
    - skill_feedback_memory

output_schema: schema.json

memory:
  read:
    - skill_feedback_memory
    - recent_trade_reviews
    - previous_skill_results
  write:
    - skill_execution_logs
    - skill_feedback_memory

evolution:
  enabled: true
  allow_prompt_patch: true
  allow_tool_param_patch: true
  require_shadow_testing: true
  auto_promote: false
